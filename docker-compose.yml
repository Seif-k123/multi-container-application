services:

  mongodb:
    image: mongo:8
    container_name: mongodb


    ports: 
      - "27017:27017"

    volumes:
      - mongo-data:/data/db



  api:
    image: seifkhaled123/multi-container-app:latest
    container_name: todo-api
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/todo-db

    depends_on:
      - mongodb

volumes:
  mongo-data:
